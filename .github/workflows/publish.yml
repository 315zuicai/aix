name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run check

      - name: Plan release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          latest="$(npm view aix-handoff version --registry=https://registry.npmjs.org/ 2>/dev/null || echo "0.0.0")"
          current="$(node -p "require('./package.json').version")"
          node - "$latest" "$current" >> "$GITHUB_OUTPUT" <<'NODE'
          const [latest, current] = process.argv.slice(2);

          function parseVersion(version) {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version);
            if (!match) {
              throw new Error(`unsupported semver version: ${version}`);
            }
            return match.slice(1).map(Number);
          }

          function compareVersions(left, right) {
            const a = parseVersion(left);
            const b = parseVersion(right);
            for (let index = 0; index < 3; index += 1) {
              if (a[index] !== b[index]) {
                return a[index] - b[index];
              }
            }
            return 0;
          }

          function bumpPatch(version) {
            const [major, minor, patch] = parseVersion(version);
            return `${major}.${minor}.${patch + 1}`;
          }

          const next = compareVersions(current, latest) > 0 ? current : bumpPatch(latest);
          console.log(`version=${next}`);
          console.log(`tag=v${next}`);
          console.log(`needs_bump=${next === current ? "false" : "true"}`);
          NODE

      - name: Bump package version
        if: steps.release.outputs.needs_bump == 'true'
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version

      - name: Sync plugin version
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const packageJson = require("./package.json");
          const pluginPaths = [
            "plugins/aix/.codex-plugin/plugin.json",
            "plugins/aix/.claude-plugin/plugin.json",
          ];

          for (const pluginPath of pluginPaths) {
            const pluginJson = JSON.parse(fs.readFileSync(pluginPath, "utf8"));
            pluginJson.version = packageJson.version;
            fs.writeFileSync(pluginPath, `${JSON.stringify(pluginJson, null, 2)}\n`);
          }

          const marketplacePath = ".claude-plugin/marketplace.json";
          const marketplaceJson = JSON.parse(fs.readFileSync(marketplacePath, "utf8"));
          const marketplacePlugin = marketplaceJson.plugins.find((plugin) => plugin.name === "aix");
          if (!marketplacePlugin) {
            throw new Error("Claude marketplace is missing the aix plugin entry");
          }
          NODE

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run --json

      - name: Check release metadata changes
        id: release_changes
        run: |
          if git diff --quiet -- package.json package-lock.json plugins/aix/.codex-plugin/plugin.json plugins/aix/.claude-plugin/plugin.json .claude-plugin/marketplace.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit release version
        if: steps.release_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json plugins/aix/.codex-plugin/plugin.json plugins/aix/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore(release): ${{ steps.release.outputs.tag }}"
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Ensure release tag exists
        if: steps.release.outputs.needs_bump == 'false'
        run: |
          if ! git rev-parse -q --verify "refs/tags/${{ steps.release.outputs.tag }}" >/dev/null; then
            git tag "${{ steps.release.outputs.tag }}"
            git push origin "${{ steps.release.outputs.tag }}"
          fi

      - name: Publish
        run: npm publish --access public --provenance
